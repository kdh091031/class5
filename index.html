<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>경일고 2학년 5반 스마트 시스템</title>

    <!-- 아이콘 설정 -->
    <link rel="icon" type="image/png" sizes="192x192" href="경일로고.png">
    <link rel="apple-touch-icon" href="경일로고.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="application-name" content="5반 스마트">
    <meta name="theme-color" content="#1a237e">

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --kyungil-blue: #1a237e;
            --kyungil-green: #2e7d32;
            --bg-color: #f0f2f5;
            --card-color: rgba(255, 255, 255, 0.9);
            --text-dark: #1c1c1c;
            --text-gray: #555;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        body { 
            font-family: -apple-system, 'Pretendard', sans-serif; 
            background-color: var(--bg-color); 
            margin: 0; padding: 20px; 
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow-x: hidden;
        }

        body::before {
            content: ""; position: fixed; top: 55%; left: 50%;
            transform: translate(-50%, -50%);
            width: 90%; max-width: 380px; height: 380px;
            background: url('경일로고.png') no-repeat center/contain;
            opacity: 0.1; z-index: -1; pointer-events: none;
        }

        .header { width: 100%; max-width: 500px; text-align: center; margin-bottom: 30px; }
        .header p { color: var(--kyungil-green); font-weight: 800; margin: 0; font-size: 13px; letter-spacing: 2px; }
        .header h1 { font-size: 28px; color: var(--kyungil-blue); margin: 8px 0; font-weight: 900; }

        .admin-bar { width: 100%; max-width: 500px; display: flex; justify-content: flex-end; gap: 8px; margin-bottom: 15px; }
        .admin-btn { background: rgba(255,255,255,0.7); border: 1px solid #ddd; border-radius: 10px; padding: 6px 12px; font-size: 11px; cursor: pointer; color: var(--text-gray); }
        
        .suggestion-btn {
            display: block; width: 100%; max-width: 500px; 
            background: linear-gradient(135deg, var(--kyungil-green), #43a047); 
            color: #fff; text-align: center; padding: 20px; border-radius: 24px;
            border: none; font-weight: 700; font-size: 17px;
            box-shadow: 0 12px 25px rgba(46, 125, 50, 0.2);
            margin-bottom: 25px; cursor: pointer; transition: transform 0.2s;
        }

        .section-title { width: 100%; max-width: 500px; font-size: 19px; font-weight: 800; margin: 20px 0 15px; color: var(--kyungil-blue); display: flex; align-items: center; }
        .section-title::before { content: ""; width: 5px; height: 20px; background: var(--kyungil-blue); margin-right: 10px; border-radius: 3px; }

        .container { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 18px; padding-bottom: 160px; }

        .card { 
            background: var(--card-color); border-radius: 28px; padding: 26px; 
            box-shadow: var(--shadow); position: relative; cursor: pointer; 
            border: 1px solid rgba(255,255,255,0.8); backdrop-filter: blur(10px);
            transition: transform 0.2s;
        }

        /* --- D-Day 디자인 확대 (1.5배) --- */
        .d-day { 
            position: absolute; top: 22px; right: 22px; 
            padding: 8px 18px; border-radius: 14px; 
            font-size: 17px; /* 기존보다 훨씬 크게 */
            font-weight: 900; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .urgent { background: #ffeded; color: #d32f2f; border: 1.5px solid #ffcdd2; }
        .upcoming { background: #f0f2ff; color: var(--kyungil-blue); border: 1.5px solid #c5cae9; }
        
        .subject-text { font-size: 22px; font-weight: 800; color: var(--text-dark); margin-top: 12px; }
        .date-text { font-size: 13px; color: var(--text-gray); font-weight: 500; }

        .admin-actions { position: absolute; top: 22px; left: 24px; display: none; gap: 8px; z-index: 10; }
        .circle-btn { width: 30px; height: 30px; border-radius: 50%; border: none; color: white; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .del-btn { background: #ff5252; }
        .edit-btn { background: #ffa000; }

        /* 공지사항 팝업 스타일 */
        .notice-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none; z-index: 5000;
            align-items: center; justify-content: center; padding: 20px; box-sizing: border-box;
        }
        .notice-content {
            background: #fff; width: 100%; max-width: 400px; border-radius: 30px;
            overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .notice-header { background: var(--kyungil-blue); color: #fff; padding: 20px; text-align: center; font-weight: 800; font-size: 18px; }
        .notice-body { padding: 25px; font-size: 16px; line-height: 1.6; color: #333; max-height: 300px; overflow-y: auto; white-space: pre-wrap; }
        .notice-footer { display: flex; border-top: 1px solid #eee; }
        .notice-close { flex: 1; padding: 18px; border: none; background: #fff; font-weight: 700; cursor: pointer; color: var(--text-gray); }
        .notice-today { flex: 1; padding: 18px; border: none; background: #f8f9fa; font-weight: 700; cursor: pointer; color: var(--kyungil-blue); border-left: 1px solid #eee; }

        /* 기타 모달/시트 */
        .bottom-sheet-overlay, .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: none; z-index: 2000;
            align-items: flex-end; justify-content: center;
        }
        .modal-overlay { align-items: center; }
        .bottom-sheet {
            background: #fff; width: 100%; max-width: 500px;
            border-radius: 32px 32px 0 0; padding: 35px 25px 60px;
            box-sizing: border-box; transform: translateY(100%); transition: transform 0.4s ease;
        }
        .bottom-sheet.show { transform: translateY(0); }
        .modal-content { background: #fff; width: 90%; max-width: 450px; border-radius: 30px; padding: 30px; box-sizing: border-box; }
        .modal-input { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #f0f0f0; border-radius: 14px; font-size: 16px; outline: none; box-sizing: border-box; }

        #admin-controls { position: fixed; bottom: 30px; width: 92%; max-width: 480px; z-index: 100; display: flex; gap: 8px; }
        .admin-action-btn { flex: 1; padding: 18px; border-radius: 18px; border: none; background: var(--kyungil-blue); color: #fff; font-weight: 700; cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>
    <!-- 공지사항 팝업 -->
    <div class="notice-overlay" id="noticeOverlay">
        <div class="notice-content">
            <div class="notice-header" id="viewNoticeTitle">📢 알림</div>
            <div class="notice-body" id="viewNoticeContent">공지사항을 불러오는 중입니다...</div>
            <div class="notice-footer">
                <button class="notice-close" onclick="closeNotice(false)">닫기</button>
                <button class="notice-today" onclick="closeNotice(true)">오늘 그만 보기</button>
            </div>
        </div>
    </div>

    <div class="header">
        <p>KYONGIL HIGH SCHOOL</p>
        <h1>2학년 5반 스마트 시스템</h1>
    </div>

    <div class="admin-bar">
        <button class="admin-btn" onclick="location.reload()">새로고침 🔄</button>
        <button class="admin-btn" id="adminBtn" onclick="toggleAdminMode()">관리자 로그인</button>
    </div>

    <button class="suggestion-btn" onclick="openModal('suggestModal')">🗳️ 익명 학급 건의함 / 자리 바꾸기</button>

    <div class="section-title">수행평가 일정</div>
    <div class="container" id="schedule-list">
        <div style="text-align:center; color:#888; padding:50px;">데이터를 불러오는 중입니다...</div>
    </div>

    <!-- 관리자 컨트롤 바 -->
    <div id="admin-controls" style="display:none;">
        <button class="admin-action-btn" onclick="openEditModal(null)">📝 일정 등록</button>
        <button class="admin-action-btn" style="background:#ef6c00" onclick="openNoticeEdit()">📢 공지 수정</button>
        <button class="admin-action-btn" style="background:var(--kyungil-green)" onclick="openAdminSuggestModal()">📥 건의 확인</button>
    </div>

    <!-- 모달/시트들 -->
    <div class="bottom-sheet-overlay" id="sheetOverlay" onclick="closeBottomSheet()">
        <div class="bottom-sheet" id="detailSheet" onclick="event.stopPropagation()">
            <div id="sheetTitle" style="font-size:26px; font-weight:900; color:var(--kyungil-blue); margin-bottom:10px;">과목명</div>
            <div id="sheetDate" style="color:var(--kyungil-green); font-weight:700; margin-bottom:20px;">날짜</div>
            <div id="sheetContent" style="background:#f8f9fa; padding:20px; border-radius:20px; white-space:pre-wrap;">상세 내용</div>
            <button class="admin-action-btn" style="width:100%; margin-top:30px;" onclick="closeBottomSheet()">확인했습니다</button>
        </div>
    </div>

    <div class="modal-overlay" id="suggestModal">
        <div class="modal-content">
            <h2 style="color:var(--kyungil-green); margin-top:0;">익명 건의함</h2>
            <textarea id="suggestInput" class="modal-input" style="height:150px" placeholder="반을 위한 의견을 남겨주세요."></textarea>
            <button class="admin-action-btn" style="width:100%; background:var(--kyungil-green);" onclick="submitSuggestion()">보내기</button>
            <button class="admin-btn" style="width:100%; margin-top:10px; padding:15px;" onclick="closeModal('suggestModal')">닫기</button>
        </div>
    </div>

    <div class="modal-overlay" id="editModal">
        <div class="modal-content">
            <h2 id="modalTitle" style="margin-top:0;">수행평가 등록</h2>
            <input type="hidden" id="editItemId">
            <input type="text" id="inputSubject" class="modal-input" placeholder="과목명">
            <input type="date" id="inputDate" class="modal-input">
            <textarea id="inputDetail" class="modal-input" style="height:140px" placeholder="상세 정보"></textarea>
            <button id="saveBtn" class="admin-action-btn" style="width:100%;" onclick="saveItem()">서버에 저장</button>
            <button class="admin-btn" style="width:100%; margin-top:10px; padding:15px;" onclick="closeModal('editModal')">닫기</button>
        </div>
    </div>

    <!-- 공지사항 수정 모달 -->
    <div class="modal-overlay" id="noticeEditModal">
        <div class="modal-content">
            <h2 style="margin-top:0;">메인 공지 수정</h2>
            <input type="text" id="editNoticeTitle" class="modal-input" placeholder="공지 제목">
            <textarea id="editNoticeContent" class="modal-input" style="height:180px" placeholder="공지 내용을 입력하세요."></textarea>
            <button class="admin-action-btn" style="width:100%; background:#ef6c00;" onclick="saveNotice()">공지 업데이트</button>
            <button class="admin-btn" style="width:100%; margin-top:10px; padding:15px;" onclick="closeModal('noticeEditModal')">취소</button>
        </div>
    </div>

    <div class="modal-overlay" id="adminSuggestModal">
        <div class="modal-content" style="max-height:80vh; overflow-y:auto;">
            <h2 style="margin-top:0;">건의사항 목록</h2>
            <div id="suggest-list"></div>
            <button class="admin-btn" style="width:100%; margin-top:20px; padding:15px;" onclick="closeModal('adminSuggestModal')">닫기</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBnDwYvG-03LNl3NZ3LkOJZnmFGQ8Zcv-k",
            databaseURL: "https://manager-47dc3-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "manager-47dc3",
            appId: "1:1035340296214:web:cf1910943c2e04d25bc537"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const scheduleRef = database.ref('schedules');
        const suggestRef = database.ref('suggestions');
        const noticeRef = database.ref('notice');

        let isAdmin = false;
        let schedules = [];

        function init() {
            // 공지사항 불러오기 및 팝업 처리
            noticeRef.on('value', (snapshot) => {
                const data = snapshot.val();
                if(data) {
                    document.getElementById('viewNoticeTitle').innerText = data.title || "📢 알림";
                    document.getElementById('viewNoticeContent').innerText = data.content || "공지사항이 없습니다.";
                    
                    // 오늘 그만 보기 체크
                    const hiddenDate = localStorage.getItem('hideNoticeUntil');
                    const todayStr = new Date().toDateString();
                    if(hiddenDate !== todayStr) {
                        document.getElementById('noticeOverlay').style.display = 'flex';
                    }
                }
            });

            // 일정 데이터 불러오기
            scheduleRef.on('value', (snapshot) => {
                const data = snapshot.val();
                schedules = [];
                if (data) Object.keys(data).forEach(key => schedules.push({ id: key, ...data[key] }));
                renderList();
            });
        }

        function renderList() {
            const list = document.getElementById('schedule-list');
            list.innerHTML = '';
            schedules.sort((a, b) => new Date(a.date) - new Date(b.date));
    
            schedules.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                const targetDate = new Date(item.date);
                targetDate.setHours(0, 0, 0, 0); 
                const today = new Date();
                today.setHours(0, 0, 0, 0); 
                const diffDays = Math.round((targetDate - today) / (1000 * 60 * 60 * 24));
        
                let ddayText, ddayClass;
                if (diffDays === 0) { ddayText = "D-Day"; ddayClass = "urgent"; }
                else if (diffDays < 0) { ddayText = "종료"; ddayClass = "upcoming"; }
                else { ddayText = "D-" + diffDays; ddayClass = diffDays <= 3 ? "urgent" : "upcoming"; }

                const adminButtons = `
                    <div class="admin-actions" style="display:${isAdmin ? 'flex' : 'none'}">
                        <button class="circle-btn del-btn" onclick="deleteItem(event, '${item.id}')">✕</button>
                        <button class="circle-btn edit-btn" onclick="openEditModal(event, '${item.id}')">✎</button>
                    </div>
                `;

                card.innerHTML = `
                    ${adminButtons}
                    <span class="d-day ${ddayClass}">${ddayText}</span>
                    <div class="date-text">${item.date}</div>
                    <div class="subject-text">${item.subject}</div>
                `;
                card.onclick = () => openBottomSheet(item);
                list.appendChild(card);
            });
        }

        // --- 공지사항 관련 함수 ---
        function closeNotice(hideToday) {
            document.getElementById('noticeOverlay').style.display = 'none';
            if(hideToday) {
                localStorage.setItem('hideNoticeUntil', new Date().toDateString());
            }
        }

        function openNoticeEdit() {
            noticeRef.once('value', (snapshot) => {
                const data = snapshot.val();
                if(data) {
                    document.getElementById('editNoticeTitle').value = data.title || "";
                    document.getElementById('editNoticeContent').value = data.content || "";
                }
                openModal('noticeEditModal');
            });
        }

        function saveNotice() {
            const title = document.getElementById('editNoticeTitle').value;
            const content = document.getElementById('editNoticeContent').value;
            noticeRef.set({ title, content }).then(() => {
                alert("공지가 업데이트되었습니다.");
                closeModal('noticeEditModal');
            });
        }

        // --- 일정 관리 함수들 ---
        function openEditModal(event, id = null) {
            if(event) event.stopPropagation();
            const modal = document.getElementById('editModal');
            const title = document.getElementById('modalTitle');
            const saveBtn = document.getElementById('saveBtn');
            const idInput = document.getElementById('editItemId');
            
            if(id) {
                const item = schedules.find(s => s.id === id);
                title.innerText = "수행평가 수정";
                saveBtn.innerText = "수정 내용 저장";
                idInput.value = id;
                document.getElementById('inputSubject').value = item.subject;
                document.getElementById('inputDate').value = item.date;
                document.getElementById('inputDetail').value = item.detail || "";
            } else {
                title.innerText = "수행평가 등록";
                saveBtn.innerText = "새 일정 등록";
                idInput.value = "";
                document.getElementById('inputSubject').value = "";
                document.getElementById('inputDate').value = "";
                document.getElementById('inputDetail').value = "";
            }
            modal.style.display = 'flex';
        }

        function saveItem() {
            const id = document.getElementById('editItemId').value;
            const subject = document.getElementById('inputSubject').value;
            const date = document.getElementById('inputDate').value;
            const detail = document.getElementById('inputDetail').value;
            if(!subject || !date) return alert("과목명과 날짜를 확인해주세요.");

            if(id) database.ref('schedules/' + id).update({ subject, date, detail }).then(() => closeModal('editModal'));
            else scheduleRef.push({ subject, date, detail }).then(() => closeModal('editModal'));
        }

        function submitSuggestion() {
            const content = document.getElementById('suggestInput').value;
            if(!content) return;
            suggestRef.push({ content, time: new Date().toLocaleString() }).then(() => {
                alert("제출되었습니다.");
                document.getElementById('suggestInput').value = '';
                closeModal('suggestModal');
            });
        }

        function openAdminSuggestModal() {
            const list = document.getElementById('suggest-list');
            list.innerHTML = "로딩 중...";
            suggestRef.once('value', (snapshot) => {
                list.innerHTML = "";
                const data = snapshot.val();
                if(data) {
                    Object.keys(data).reverse().forEach(key => {
                        const div = document.createElement('div');
                        div.style = "padding:15px; background:#f0f7f0; border-radius:15px; margin-bottom:12px; position:relative; font-size:14px;";
                        div.innerHTML = `<small style='color:#777'>${data[key].time}</small><br><div style='margin-top:5px'>${data[key].content}</div>
                                         <button onclick="deleteSuggest('${key}')" style="position:absolute; top:12px; right:12px; border:none; background:none; color:#ff5252; font-weight:bold; cursor:pointer;">삭제</button>`;
                        list.appendChild(div);
                    });
                } else { list.innerHTML = "비어 있습니다."; }
                document.getElementById('adminSuggestModal').style.display = 'flex';
            });
        }

        function deleteSuggest(id) { if(confirm("삭제하시겠습니까?")) database.ref('suggestions/' + id).remove().then(() => openAdminSuggestModal()); }

        function toggleAdminMode() {
            if(isAdmin) { isAdmin = false; document.getElementById('admin-controls').style.display = 'none'; document.getElementById('adminBtn').innerText = "관리자 로그인"; renderList(); return; }
            if(prompt("비밀번호?") === "2026205suheang") {
                isAdmin = true;
                document.getElementById('admin-controls').style.display = 'flex';
                document.getElementById('adminBtn').innerText = "관리자 (ON)";
                renderList();
            }
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        
        function openBottomSheet(item) {
            document.getElementById('sheetTitle').innerText = item.subject;
            document.getElementById('sheetDate').innerText = "마감 기한: " + item.date;
            document.getElementById('sheetContent').innerText = item.detail || "상세 정보가 등록되지 않았습니다.";
            document.getElementById('sheetOverlay').style.display = 'flex';
            setTimeout(() => document.getElementById('detailSheet').classList.add('show'), 10);
        }

        function closeBottomSheet() {
            document.getElementById('detailSheet').classList.remove('show');
            setTimeout(() => document.getElementById('sheetOverlay').style.display = 'none', 400);
        }

        function deleteItem(event, id) {
            event.stopPropagation();
            if(confirm("이 일정을 영구 삭제하시겠습니까?")) database.ref('schedules/' + id).remove();
        }

        init();
    </script>
</body>
</html>
